<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Bookmarks</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header>
      <img src="icons/icon48.png" alt="logo" class="logo" />
      <h1>My Bookmarks</h1>
      <button id="settings-btn" class="btn btn-ghost icon" title="Settings">⚙</button>
    </header>

    <!-- NOT LOGGED IN -->
    <div id="auth-section" class="hidden">
      <p class="hint">Login to save bookmarks to your server.</p>
      <button id="login-btn" class="btn btn-google">
        <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.017 17.64 11.71 17.64 9.2z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.836.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Login with Google
      </button>
    </div>

    <!-- SETTINGS -->
    <div id="settings-section" class="hidden">
      <div class="field">
        <label>API / Frontend URL</label>
        <input type="text" id="api-url" placeholder="http://localhost:3000" />
      </div>
      <div id="settings-status" class="status hidden"></div>
      <div class="actions">
        <button id="save-settings-btn" class="btn btn-primary">Save</button>
        <button id="logout-btn" class="btn btn-danger">Logout</button>
        <button id="cancel-settings-btn" class="btn btn-ghost">Cancel</button>
      </div>
    </div>

    <!-- MAIN SECTION -->
    <div id="main-section" class="hidden">
      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" data-tab="browse">Browse</button>
        <button class="tab" data-tab="save">Save</button>
      </div>

      <!-- SAVE TAB -->
      <div id="tab-save" class="hidden">
        <div class="page-preview">
          <img id="page-favicon" class="page-favicon hidden" width="16" height="16" />
          <span id="page-domain" class="page-domain"></span>
        </div>
        <div class="field">
          <label>Title</label>
          <input type="text" id="title" placeholder="Page title" />
        </div>
        <div class="field">
          <label>URL</label>
          <input type="text" id="url" readonly />
        </div>
        <div class="field">
          <label>Description</label>
          <textarea id="description" rows="2" placeholder="Optional…"></textarea>
        </div>
        <div class="field">
          <label>Tags</label>
          <input type="text" id="tags" placeholder="tech, news" />
        </div>
        <div class="field">
          <label>Category</label>
          <select id="category">
            <option value="">— None —</option>
          </select>
        </div>
        <div id="status" class="status hidden"></div>
        <div class="actions">
          <button id="save-btn" class="btn btn-primary">Save Bookmark</button>
          <a id="dashboard-link" href="#" target="_blank" class="btn btn-ghost">Dashboard ↗</a>
        </div>
      </div>

      <!-- BROWSE TAB -->
      <div id="tab-browse">
        <div class="search-bar">
          <input type="text" id="search-input" placeholder="Search bookmarks…" />
        </div>
        <div id="bookmarks-list">
          <p class="list-hint">Loading…</p>
        </div>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
