version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my-bookmarks-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_PATH: /app/storage/data/bookmarks.db
      LOGS_DIR: /app/storage/logs
    volumes:
      # Single folder on disk — contains data/, logs/, config/
      - ./backend-data:/app/storage
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
